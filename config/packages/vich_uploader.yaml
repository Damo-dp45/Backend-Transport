vich_uploader:
    db_driver: orm

    mappings:
        media_object:
            uri_prefix: /images/media
            upload_destination: "%kernel.project_dir%/public/images/media"
            # Will rename uploaded files using a uniqueid as a suffix.
            namer: Vich\UploaderBundle\Naming\SmartUniqueNamer

        users:
            uri_prefix: /images/users
            upload_destination: '%kernel.project_dir%/public/images/users'
            namer: Vich\UploaderBundle\Naming\SmartUniqueNamer